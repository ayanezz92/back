spring.application.name=ms-donaciones
server.port=8085

# Control transaccional de recaudacion de fondos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_donaciones}
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Permite que el script corra de forma tardia
spring.jpa.defer-datasource-initialization=true
# 🚨 CORREGIDO: faltaba esta línea. Como la base de datos NO es embebida (es Postgres),
# Spring Boot por defecto NO ejecuta data.sql a menos que se fuerce con mode=always.
# Sin esto, el archivo de datos de ejemplo se ignoraba silenciosamente al iniciar.
spring.sql.init.mode=always
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true
