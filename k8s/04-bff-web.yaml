apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-web
  namespace: sanos-salvos
  labels:
    app: bff-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff-web
  template:
    metadata:
      labels:
        app: bff-web
    spec:
      containers:
        - name: bff-web
          image: ayanez92/sanos-salvos-bff-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
          env:
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka/"
          resources:
            requests:
              cpu: "150m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            tcpSocket:
              port: 8091
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8091
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: bff-web
  namespace: sanos-salvos
  labels:
    app: bff-web
spec:
  selector:
    app: bff-web
  ports:
    - port: 8091
      targetPort: 8091
  type: ClusterIP
