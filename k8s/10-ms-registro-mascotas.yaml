apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-registro-mascotas
  namespace: sanos-salvos
  labels:
    app: ms-registro-mascotas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-registro-mascotas
  template:
    metadata:
      labels:
        app: ms-registro-mascotas
    spec:
      containers:
        - name: ms-registro-mascotas
          image: ayanez92/sanos-salvos-ms-registro-mascotas:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8086
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/db_mascotas"
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://eureka-server:8761/eureka/"
          resources:
            requests:
              cpu: "150m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            tcpSocket:
              port: 8086
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8086
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: ms-registro-mascotas
  namespace: sanos-salvos
  labels:
    app: ms-registro-mascotas
spec:
  selector:
    app: ms-registro-mascotas
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP
